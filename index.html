<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Hand Light Motion</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; width: 100vw; height: 100vh; font-family: -apple-system, sans-serif; }
  canvas#fx { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
  video#cam { display: none; }

  #start-screen {
    position: fixed; inset: 0; z-index: 200;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: #000; color: #fff; transition: opacity 0.8s;
  }
  #start-screen.hidden { opacity: 0; pointer-events: none; }
  #start-screen h1 {
    font-size: 38px; font-weight: 700;
    background: linear-gradient(90deg, #4af, #a6f, #4ff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 30px;
  }
  #start-btn {
    padding: 14px 40px; font-size: 16px; font-weight: 600;
    border: none; border-radius: 30px; cursor: pointer;
    background: linear-gradient(135deg, #4af, #a6f);
    color: #fff; transition: transform 0.2s;
  }
  #start-btn:hover { transform: scale(1.05); }

  #controls {
    position: fixed; top: 15px; right: 15px;
    background: rgba(0,0,0,0.75); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 14px;
    padding: 16px; z-index: 100; color: #fff; min-width: 240px;
    transition: opacity 0.4s, transform 0.4s;
  }
  #controls.hidden { opacity: 0; transform: translateX(280px); pointer-events: none; }
  #controls h3 { font-size: 12px; margin-bottom: 12px; opacity: 0.5; letter-spacing: 1px; text-transform: uppercase; }
  .ctrl-group { margin-bottom: 10px; }
  .ctrl-group label { display: block; font-size: 11px; opacity: 0.5; margin-bottom: 3px; }
  .ctrl-group input[type=range] { width: 100%; accent-color: #4af; }
  .preset-btn {
    display: inline-block; padding: 5px 11px; margin: 3px 2px;
    border: 1px solid rgba(255,255,255,0.15); border-radius: 16px;
    background: rgba(255,255,255,0.04); color: #fff; font-size: 11px;
    cursor: pointer; transition: all 0.3s;
  }
  .preset-btn:hover, .preset-btn.active { background: rgba(80,160,255,0.3); border-color: #4af; }
  #toggle-btn {
    position: fixed; top: 15px; right: 15px; z-index: 101;
    background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2);
    color: #fff; width: 36px; height: 36px; border-radius: 50%;
    cursor: pointer; font-size: 16px; display: none; align-items: center; justify-content: center;
  }
  #status {
    position: fixed; bottom: 15px; left: 15px; z-index: 100;
    color: rgba(255,255,255,0.25); font-size: 11px;
  }
</style>
</head>
<body>

<div id="start-screen">
  <h1>Hand Light Motion</h1>
  <button id="start-btn">Start Camera</button>
</div>

<video id="cam" playsinline></video>
<canvas id="fx"></canvas>

<div id="controls" class="hidden">
  <h3>Controls</h3>
  <div class="ctrl-group">
    <label>Theme</label>
    <span class="preset-btn active" data-preset="cosmic">Cosmic Blue</span>
    <span class="preset-btn" data-preset="nebula">Nebula</span>
    <span class="preset-btn" data-preset="matrix">Matrix</span>
    <span class="preset-btn" data-preset="fire">Fire</span>
    <span class="preset-btn" data-preset="aurora">Aurora</span>
    <span class="preset-btn" data-preset="cyber">Cyberpunk</span>
  </div>
  <div class="ctrl-group">
    <label>Brightness: <span id="bright-val">100%</span></label>
    <input type="range" id="bright" min="50" max="200" step="10" value="100">
  </div>
  <div class="ctrl-group">
    <label>Particle Density: <span id="density-val">100%</span></label>
    <input type="range" id="density" min="30" max="150" step="10" value="100">
  </div>
  <div class="ctrl-group">
    <label>Wave Height: <span id="wave-val">100%</span></label>
    <input type="range" id="wave" min="20" max="200" step="10" value="100">
  </div>
  <div class="ctrl-group">
    <label>Speed: <span id="speed-val">1.0x</span></label>
    <input type="range" id="speed" min="0.3" max="3" step="0.1" value="1">
  </div>
  <div style="margin-top:8px;font-size:10px;opacity:0.3;"><b>H</b> hide · <b>F</b> fullscreen · <b>1-6</b> presets</div>
</div>
<button id="toggle-btn">⚙</button>
<div id="status">Waiting...</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js"></script>
<script>
const canvas = document.getElementById('fx');
const ctx = canvas.getContext('2d');
const video = document.getElementById('cam');

let W, H, time = 0, paused = false;
let brightness = 1.0, densityMul = 1.0, waveMul = 1.0, speedMul = 1.0;
let currentPreset = 'cosmic';
let handLandmarks = [];
let fingerTips = []; // {x, y, vx, vy, speed}

const presets = {
  cosmic: {
    primary: [60, 140, 255],
    secondary: [120, 80, 255],
    accent: [0, 220, 255],
    stars: [180, 200, 255],
    orb: [40, 120, 255],
    bg: [2, 3, 12]
  },
  nebula: {
    primary: [200, 50, 255],
    secondary: [80, 50, 255],
    accent: [255, 100, 200],
    stars: [220, 180, 255],
    orb: [180, 40, 255],
    bg: [8, 2, 15]
  },
  matrix: {
    primary: [0, 255, 80],
    secondary: [0, 180, 60],
    accent: [100, 255, 150],
    stars: [0, 200, 80],
    orb: [0, 255, 65],
    bg: [0, 5, 2]
  },
  fire: {
    primary: [255, 100, 0],
    secondary: [255, 50, 0],
    accent: [255, 200, 50],
    stars: [255, 150, 50],
    orb: [255, 80, 0],
    bg: [12, 3, 0]
  },
  aurora: {
    primary: [0, 220, 180],
    secondary: [80, 200, 255],
    accent: [100, 255, 150],
    stars: [150, 255, 220],
    orb: [0, 200, 160],
    bg: [2, 8, 8]
  },
  cyber: {
    primary: [255, 0, 200],
    secondary: [0, 255, 255],
    accent: [255, 255, 0],
    stars: [255, 100, 255],
    orb: [255, 0, 180],
    bg: [8, 0, 10]
  }
};

// --- Particle Grid ---
const COLS = 60;
const ROWS = 40;
let grid = [];

function initGrid() {
  grid = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      grid.push({
        baseX: (c / (COLS - 1)),
        baseY: (r / (ROWS - 1)),
        x: 0, y: 0, z: 0,
        brightness: 0
      });
    }
  }
}
initGrid();

// --- Stars ---
const stars = [];
for (let i = 0; i < 200; i++) {
  stars.push({
    x: Math.random(), y: Math.random(),
    size: 0.5 + Math.random() * 1.5,
    twinkle: Math.random() * Math.PI * 2,
    speed: 0.5 + Math.random() * 2
  });
}

function resize() {
  W = canvas.width = window.innerWidth * devicePixelRatio;
  H = canvas.height = window.innerHeight * devicePixelRatio;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
}
window.addEventListener('resize', resize);
resize();

// Smooth noise
function noise(x, y, t) {
  return Math.sin(x * 1.5 + t) * Math.cos(y * 1.2 + t * 0.7) +
         Math.sin(x * 0.8 + y * 1.1 + t * 0.5) * 0.5;
}

// --- Finger tracking ---
const tipIdx = [4, 8, 12, 16, 20];
let prevTips = {};

function onResults(results) {
  handLandmarks = results.multiHandLandmarks || [];
  fingerTips = [];

  for (let hi = 0; hi < handLandmarks.length; hi++) {
    const hand = handLandmarks[hi];
    for (const ti of tipIdx) {
      const lm = hand[ti];
      const key = `${hi}_${ti}`;
      const px = prevTips[key] || { x: lm.x, y: lm.y };
      const vx = lm.x - px.x;
      const vy = lm.y - px.y;
      const spd = Math.sqrt(vx * vx + vy * vy);
      fingerTips.push({
        x: 1 - lm.x, // mirror
        y: lm.y,
        vx, vy, speed: spd
      });
      prevTips[key] = { x: lm.x, y: lm.y };
    }
  }

  const dot = handLandmarks.length > 0 ? 'on' : 'off';
  document.getElementById('status').innerHTML =
    `<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${dot === 'on' ? '#0f0' : '#f00'};margin-right:5px;vertical-align:middle;"></span>` +
    (handLandmarks.length > 0 ? `Tracking ${handLandmarks.length} hand(s)` : 'Show your hands');
}

// --- Drawing ---
function draw() {
  if (paused) { requestAnimationFrame(draw); return; }
  time += 0.016 * speedMul;
  const p = presets[currentPreset];
  const br = brightness;

  // Clear
  ctx.fillStyle = `rgb(${p.bg[0]},${p.bg[1]},${p.bg[2]})`;
  ctx.fillRect(0, 0, W, H);

  // --- Stars ---
  for (const s of stars) {
    const alpha = (0.3 + 0.7 * Math.abs(Math.sin(time * s.speed + s.twinkle))) * br * 0.6;
    ctx.fillStyle = `rgba(${p.stars[0]},${p.stars[1]},${p.stars[2]},${alpha})`;
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.size * devicePixelRatio, 0, Math.PI * 2);
    ctx.fill();
  }

  // --- Central Orb ---
  const orbX = W * 0.5;
  const orbY = H * 0.45;
  const orbPulse = 1 + Math.sin(time * 1.5) * 0.15;
  const orbR = Math.min(W, H) * 0.08 * orbPulse;

  // Outer glow
  for (let i = 4; i >= 0; i--) {
    const r = orbR * (1 + i * 0.8);
    const a = br * 0.06 / (i + 1);
    const g = ctx.createRadialGradient(orbX, orbY, 0, orbX, orbY, r);
    g.addColorStop(0, `rgba(${p.orb[0]},${p.orb[1]},${p.orb[2]},${a})`);
    g.addColorStop(1, `rgba(${p.orb[0]},${p.orb[1]},${p.orb[2]},0)`);
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(orbX, orbY, r, 0, Math.PI * 2);
    ctx.fill();
  }

  // Core
  const coreG = ctx.createRadialGradient(orbX, orbY, 0, orbX, orbY, orbR);
  coreG.addColorStop(0, `rgba(255,255,255,${0.9 * br})`);
  coreG.addColorStop(0.2, `rgba(${p.primary[0]},${p.primary[1]},${p.primary[2]},${0.8 * br})`);
  coreG.addColorStop(0.6, `rgba(${p.orb[0]},${p.orb[1]},${p.orb[2]},${0.4 * br})`);
  coreG.addColorStop(1, `rgba(${p.orb[0]},${p.orb[1]},${p.orb[2]},0)`);
  ctx.fillStyle = coreG;
  ctx.beginPath();
  ctx.arc(orbX, orbY, orbR, 0, Math.PI * 2);
  ctx.fill();

  // Orb ring
  ctx.strokeStyle = `rgba(${p.accent[0]},${p.accent[1]},${p.accent[2]},${0.3 * br})`;
  ctx.lineWidth = 1.5 * devicePixelRatio;
  ctx.beginPath();
  ctx.ellipse(orbX, orbY, orbR * 1.5, orbR * 0.5, time * 0.3, 0, Math.PI * 2);
  ctx.stroke();

  // --- 3D Particle Wave Grid ---
  const effectiveCols = Math.floor(COLS * densityMul);
  const effectiveRows = Math.floor(ROWS * densityMul);
  const dotSize = (1.5 + Math.sin(time) * 0.3) * devicePixelRatio;

  for (let r = 0; r < effectiveRows; r++) {
    for (let c = 0; c < effectiveCols; c++) {
      const bx = c / (effectiveCols - 1);
      const by = r / (effectiveRows - 1);

      // 3D wave displacement
      const waveX = bx * 8 - 4;
      const waveY = by * 6 - 3;
      const waveZ = noise(waveX, waveY, time * 0.8) * 0.08 * waveMul;

      // Perspective projection
      const perspective = 1.2 / (1.2 + waveZ);
      const screenX = W * (0.1 + bx * 0.8) * perspective + (1 - perspective) * W * 0.5;
      const screenY = H * (0.15 + by * 0.7) * perspective + (1 - perspective) * H * 0.45;

      // Distance from orb center
      const dx = screenX - orbX;
      const dy = screenY - orbY;
      const distOrb = Math.sqrt(dx * dx + dy * dy) / Math.min(W, H);

      // Base brightness — brighter near orb
      let dotBright = Math.max(0, 1 - distOrb * 2) * 0.5 + 0.15;
      dotBright += waveZ * 3;

      // --- Finger interaction ---
      for (const ft of fingerTips) {
        const fdx = bx - ft.x;
        const fdy = by - ft.y;
        const fd = Math.sqrt(fdx * fdx + fdy * fdy);
        const influence = Math.max(0, 1 - fd * 5); // radius of influence
        dotBright += influence * (0.8 + ft.speed * 15);
      }

      dotBright = Math.min(dotBright, 1.5) * br;

      if (dotBright < 0.05) continue;

      // Color: blend primary → accent based on height
      const t2 = Math.max(0, Math.min(1, waveZ * 5 + 0.5));
      const cr = p.primary[0] + (p.accent[0] - p.primary[0]) * t2;
      const cg = p.primary[1] + (p.accent[1] - p.primary[1]) * t2;
      const cb = p.primary[2] + (p.accent[2] - p.primary[2]) * t2;

      const sz = dotSize * perspective * (0.5 + dotBright);
      const alpha = Math.min(dotBright, 1);

      // Glow
      if (dotBright > 0.5) {
        const glowR = sz * 4;
        const gg = ctx.createRadialGradient(screenX, screenY, 0, screenX, screenY, glowR);
        gg.addColorStop(0, `rgba(${cr|0},${cg|0},${cb|0},${alpha * 0.15})`);
        gg.addColorStop(1, `rgba(${cr|0},${cg|0},${cb|0},0)`);
        ctx.fillStyle = gg;
        ctx.beginPath();
        ctx.arc(screenX, screenY, glowR, 0, Math.PI * 2);
        ctx.fill();
      }

      // Dot
      ctx.fillStyle = `rgba(${cr|0},${cg|0},${cb|0},${alpha})`;
      ctx.beginPath();
      ctx.arc(screenX, screenY, sz, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // --- Finger glow orbs ---
  for (const ft of fingerTips) {
    const fx = ft.x * W;
    const fy = ft.y * H;
    const intensity = 0.3 + ft.speed * 10;
    const r = (30 + ft.speed * 300) * devicePixelRatio * br;

    // Big glow
    const fg = ctx.createRadialGradient(fx, fy, 0, fx, fy, r);
    fg.addColorStop(0, `rgba(${p.accent[0]},${p.accent[1]},${p.accent[2]},${Math.min(intensity, 0.6)})`);
    fg.addColorStop(0.3, `rgba(${p.primary[0]},${p.primary[1]},${p.primary[2]},${intensity * 0.3})`);
    fg.addColorStop(1, `rgba(${p.primary[0]},${p.primary[1]},${p.primary[2]},0)`);
    ctx.fillStyle = fg;
    ctx.beginPath();
    ctx.arc(fx, fy, r, 0, Math.PI * 2);
    ctx.fill();

    // Bright core
    const cr2 = 6 * devicePixelRatio;
    ctx.fillStyle = `rgba(255,255,255,${Math.min(intensity * 0.8, 0.9)})`;
    ctx.beginPath();
    ctx.arc(fx, fy, cr2, 0, Math.PI * 2);
    ctx.fill();
  }

  // --- Light rays from orb ---
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  for (let i = 0; i < 6; i++) {
    const angle = time * 0.15 + i * Math.PI / 3;
    const len = Math.min(W, H) * (0.3 + Math.sin(time * 0.5 + i) * 0.1);
    const ex = orbX + Math.cos(angle) * len;
    const ey = orbY + Math.sin(angle) * len;

    const rg = ctx.createLinearGradient(orbX, orbY, ex, ey);
    rg.addColorStop(0, `rgba(${p.orb[0]},${p.orb[1]},${p.orb[2]},${0.08 * br})`);
    rg.addColorStop(1, `rgba(${p.orb[0]},${p.orb[1]},${p.orb[2]},0)`);
    ctx.strokeStyle = rg;
    ctx.lineWidth = 3 * devicePixelRatio;
    ctx.beginPath();
    ctx.moveTo(orbX, orbY);
    ctx.lineTo(ex, ey);
    ctx.stroke();
  }
  ctx.restore();

  requestAnimationFrame(draw);
}

// --- Init ---
async function init() {
  const hands = new window.Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${file}`
  });
  hands.setOptions({
    maxNumHands: 2, modelComplexity: 1,
    minDetectionConfidence: 0.6, minTrackingConfidence: 0.5
  });
  hands.onResults(onResults);

  const stream = await navigator.mediaDevices.getUserMedia({
    video: { width: 1280, height: 720, facingMode: 'user' }
  });
  video.srcObject = stream;
  await video.play();

  const cam = new window.Camera(video, {
    onFrame: async () => { await hands.send({ image: video }); },
    width: 1280, height: 720
  });
  cam.start();

  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('controls').classList.remove('hidden');
  draw();
}

document.getElementById('start-btn').addEventListener('click', () => {
  const btn = document.getElementById('start-btn');
  btn.textContent = 'Loading...';
  btn.style.opacity = '0.6';
  init().catch(err => {
    btn.textContent = 'Error - Tap to Retry';
    btn.style.opacity = '1';
    console.error('Init error:', err);
  });
});

// Controls
document.getElementById('bright').addEventListener('input', e => {
  brightness = parseInt(e.target.value) / 100;
  document.getElementById('bright-val').textContent = parseInt(e.target.value) + '%';
});
document.getElementById('density').addEventListener('input', e => {
  densityMul = parseInt(e.target.value) / 100;
  document.getElementById('density-val').textContent = parseInt(e.target.value) + '%';
});
document.getElementById('wave').addEventListener('input', e => {
  waveMul = parseInt(e.target.value) / 100;
  document.getElementById('wave-val').textContent = parseInt(e.target.value) + '%';
});
document.getElementById('speed').addEventListener('input', e => {
  speedMul = parseFloat(e.target.value);
  document.getElementById('speed-val').textContent = speedMul.toFixed(1) + 'x';
});

document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentPreset = btn.dataset.preset;
  });
});

const controls = document.getElementById('controls');
const toggleBtn = document.getElementById('toggle-btn');
document.addEventListener('keydown', e => {
  if (e.key === 'h' || e.key === 'H') {
    controls.classList.toggle('hidden');
    toggleBtn.style.display = controls.classList.contains('hidden') ? 'flex' : 'none';
  }
  if (e.key === 'f' || e.key === 'F') {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  }
  if (e.key === ' ') { e.preventDefault(); paused = !paused; }
  const presetNames = Object.keys(presets);
  const idx = parseInt(e.key) - 1;
  if (idx >= 0 && idx < presetNames.length) {
    currentPreset = presetNames[idx];
    document.querySelectorAll('.preset-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.preset === currentPreset));
  }
});
toggleBtn.addEventListener('click', () => { controls.classList.remove('hidden'); toggleBtn.style.display = 'none'; });
document.addEventListener('wheel', e => e.preventDefault(), { passive: false });

if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
</script>
</body>
</html>
