<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Hand Light Motion</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }
  canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; }
  video { display: none; }

  #start-screen {
    position: fixed; inset: 0; z-index: 200;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: #000; color: #fff; transition: opacity 0.8s;
  }
  #start-screen.hidden { opacity: 0; pointer-events: none; }
  #start-screen h1 {
    font-size: 36px; font-weight: 700;
    background: linear-gradient(90deg, #f0f, #0ff, #ff0, #0f0, #f0f);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 30px;
  }
  #start-btn {
    padding: 14px 40px; font-size: 16px; font-weight: 600;
    border: none; border-radius: 30px; cursor: pointer;
    background: linear-gradient(135deg, #f0f, #0ff);
    color: #fff;
  }
</style>
</head>
<body>

<div id="start-screen">
  <h1>Hand Light Motion</h1>
  <button id="start-btn">Start Camera</button>
</div>

<video id="cam" playsinline></video>
<canvas id="fx"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js"></script>
<script>
const canvas = document.getElementById('fx');
const ctx = canvas.getContext('2d');
const video = document.getElementById('cam');

let W, H, time = 0;
let handLandmarks = [];
let prevTips = {};

// Each finger gets a distinct bright color
const fingerColors = [
  [255, 50, 200],   // thumb — hot pink
  [0, 200, 255],    // index — cyan
  [180, 50, 255],   // middle — purple
  [255, 180, 0],    // ring — orange/gold
  [0, 255, 120],    // pinky — green
];

// Extra colors for second hand
const fingerColors2 = [
  [255, 0, 80],
  [0, 255, 255],
  [100, 0, 255],
  [255, 255, 0],
  [0, 255, 200],
];

const tipIdx = [4, 8, 12, 16, 20];
const mcpIdx = [2, 5, 9, 13, 17]; // knuckle bases
const wristIdx = 0;

// Trail history per finger
const trails = {};
const TRAIL_LEN = 25;

function resize() {
  W = canvas.width = window.innerWidth * devicePixelRatio;
  H = canvas.height = window.innerHeight * devicePixelRatio;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
}
window.addEventListener('resize', resize);
resize();

function onResults(results) {
  handLandmarks = results.multiHandLandmarks || [];
}

function draw() {
  time += 0.016;

  // --- Draw camera feed (visible!) ---
  ctx.save();
  ctx.scale(-1 * devicePixelRatio, devicePixelRatio);
  ctx.drawImage(video, -window.innerWidth, 0, window.innerWidth, window.innerHeight);
  ctx.restore();

  // Slight dark overlay so light effects pop
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fillRect(0, 0, W, H);

  // --- Process each hand ---
  for (let hi = 0; hi < handLandmarks.length; hi++) {
    const hand = handLandmarks[hi];
    const colors = hi === 0 ? fingerColors : fingerColors2;
    const wrist = hand[wristIdx];
    const wx = (1 - wrist.x) * W;
    const wy = wrist.y * H;

    // --- Draw light beam for each finger ---
    for (let fi = 0; fi < tipIdx.length; fi++) {
      const tip = hand[tipIdx[fi]];
      const mcp = hand[mcpIdx[fi]];
      const color = colors[fi];
      const key = `${hi}_${fi}`;

      const tx = (1 - tip.x) * W;
      const ty = tip.y * H;
      const mx = (1 - mcp.x) * W;
      const my = mcp.y * H;

      // Velocity
      const prev = prevTips[key] || { x: tx, y: ty };
      const vx = tx - prev.x;
      const vy = ty - prev.y;
      const speed = Math.sqrt(vx * vx + vy * vy) / W;
      prevTips[key] = { x: tx, y: ty };

      // Trail
      if (!trails[key]) trails[key] = [];
      trails[key].unshift({ x: tx, y: ty, t: time });
      if (trails[key].length > TRAIL_LEN) trails[key].pop();

      // --- Light beam from knuckle to fingertip (extending beyond) ---
      const dx = tx - mx;
      const dy = ty - my;
      const len = Math.sqrt(dx * dx + dy * dy);
      const extendLen = len * 4; // beam extends far past fingertip
      const ex = tx + (dx / len) * extendLen * 0.5;
      const ey = ty + (dy / len) * extendLen * 0.5;

      // Beam glow (wide)
      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      ctx.lineWidth = (28 + speed * 1200) * devicePixelRatio;
      ctx.lineCap = 'round';
      const beamGrad = ctx.createLinearGradient(mx, my, ex, ey);
      beamGrad.addColorStop(0, `rgba(${color[0]},${color[1]},${color[2]},0)`);
      beamGrad.addColorStop(0.3, `rgba(${color[0]},${color[1]},${color[2]},0.15)`);
      beamGrad.addColorStop(0.6, `rgba(${color[0]},${color[1]},${color[2]},0.3)`);
      beamGrad.addColorStop(1, `rgba(${color[0]},${color[1]},${color[2]},0)`);
      ctx.strokeStyle = beamGrad;
      ctx.beginPath();
      ctx.moveTo(mx, my);
      ctx.lineTo(ex, ey);
      ctx.stroke();

      // Beam core (thin, bright)
      ctx.lineWidth = (8 + speed * 400) * devicePixelRatio;
      const coreGrad = ctx.createLinearGradient(mx, my, ex, ey);
      coreGrad.addColorStop(0, `rgba(${color[0]},${color[1]},${color[2]},0)`);
      coreGrad.addColorStop(0.4, `rgba(255,255,255,0.5)`);
      coreGrad.addColorStop(0.7, `rgba(${color[0]},${color[1]},${color[2]},0.6)`);
      coreGrad.addColorStop(1, `rgba(${color[0]},${color[1]},${color[2]},0)`);
      ctx.strokeStyle = coreGrad;
      ctx.beginPath();
      ctx.moveTo(mx, my);
      ctx.lineTo(ex, ey);
      ctx.stroke();
      ctx.restore();

      // --- Fingertip glow orb ---
      const glowSize = (50 + speed * 1500) * devicePixelRatio;

      // Outer glow
      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      const g1 = ctx.createRadialGradient(tx, ty, 0, tx, ty, glowSize);
      g1.addColorStop(0, `rgba(${color[0]},${color[1]},${color[2]},0.6)`);
      g1.addColorStop(0.3, `rgba(${color[0]},${color[1]},${color[2]},0.25)`);
      g1.addColorStop(0.7, `rgba(${color[0]},${color[1]},${color[2]},0.05)`);
      g1.addColorStop(1, `rgba(${color[0]},${color[1]},${color[2]},0)`);
      ctx.fillStyle = g1;
      ctx.beginPath();
      ctx.arc(tx, ty, glowSize, 0, Math.PI * 2);
      ctx.fill();

      // White hot center
      const coreSize = (8 + speed * 200) * devicePixelRatio;
      const g2 = ctx.createRadialGradient(tx, ty, 0, tx, ty, coreSize);
      g2.addColorStop(0, `rgba(255,255,255,0.95)`);
      g2.addColorStop(0.5, `rgba(${color[0]},${color[1]},${color[2]},0.7)`);
      g2.addColorStop(1, `rgba(${color[0]},${color[1]},${color[2]},0)`);
      ctx.fillStyle = g2;
      ctx.beginPath();
      ctx.arc(tx, ty, coreSize, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      // --- Trail (light streak following finger movement) ---
      if (trails[key].length > 2) {
        ctx.save();
        ctx.globalCompositeOperation = 'screen';
        for (let i = 0; i < trails[key].length - 1; i++) {
          const t1 = trails[key][i];
          const t2 = trails[key][i + 1];
          const alpha = (1 - i / trails[key].length) * 0.4;
          const width = (1 - i / trails[key].length) * 8 * devicePixelRatio;
          ctx.strokeStyle = `rgba(${color[0]},${color[1]},${color[2]},${alpha})`;
          ctx.lineWidth = width;
          ctx.lineCap = 'round';
          ctx.beginPath();
          ctx.moveTo(t1.x, t1.y);
          ctx.lineTo(t2.x, t2.y);
          ctx.stroke();
        }
        ctx.restore();
      }
    }

    // --- Connect fingers with light web (between adjacent fingertips) ---
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    for (let fi = 0; fi < tipIdx.length - 1; fi++) {
      const t1 = hand[tipIdx[fi]];
      const t2 = hand[tipIdx[fi + 1]];
      const x1 = (1 - t1.x) * W, y1 = t1.y * H;
      const x2 = (1 - t2.x) * W, y2 = t2.y * H;
      const dist = Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);

      // Only connect if fingers are relatively close
      if (dist < W * 0.25) {
        const c1 = colors[fi], c2 = colors[fi + 1];
        const alpha = Math.max(0, 0.2 - dist / W);

        const lg = ctx.createLinearGradient(x1, y1, x2, y2);
        lg.addColorStop(0, `rgba(${c1[0]},${c1[1]},${c1[2]},${alpha})`);
        lg.addColorStop(0.5, `rgba(255,255,255,${alpha * 0.5})`);
        lg.addColorStop(1, `rgba(${c2[0]},${c2[1]},${c2[2]},${alpha})`);
        ctx.strokeStyle = lg;
        ctx.lineWidth = 3 * devicePixelRatio;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
      }
    }

    // Connect thumb to index with special arc
    const thumb = hand[tipIdx[0]];
    const index = hand[tipIdx[1]];
    const thx = (1 - thumb.x) * W, thy = thumb.y * H;
    const inx = (1 - index.x) * W, iny = index.y * H;
    const tiDist = Math.sqrt((thx - inx) ** 2 + (thy - iny) ** 2);
    if (tiDist < W * 0.2) {
      const arcAlpha = Math.max(0, 0.25 - tiDist / W);
      const ag = ctx.createLinearGradient(thx, thy, inx, iny);
      ag.addColorStop(0, `rgba(${colors[0][0]},${colors[0][1]},${colors[0][2]},${arcAlpha})`);
      ag.addColorStop(1, `rgba(${colors[1][0]},${colors[1][1]},${colors[1][2]},${arcAlpha})`);
      ctx.strokeStyle = ag;
      ctx.lineWidth = 5 * devicePixelRatio;
      ctx.beginPath();
      const cpx = (thx + inx) / 2, cpy = (thy + iny) / 2 - tiDist * 0.3;
      ctx.moveTo(thx, thy);
      ctx.quadraticCurveTo(cpx, cpy, inx, iny);
      ctx.stroke();
    }
    ctx.restore();

    // --- Palm glow ---
    const palmCenter = hand[9]; // middle MCP
    const pcx = (1 - palmCenter.x) * W;
    const pcy = palmCenter.y * H;
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    const palmR = 80 * devicePixelRatio;
    const pg = ctx.createRadialGradient(pcx, pcy, 0, pcx, pcy, palmR);
    pg.addColorStop(0, `rgba(180,150,255,0.12)`);
    pg.addColorStop(1, `rgba(180,150,255,0)`);
    ctx.fillStyle = pg;
    ctx.beginPath();
    ctx.arc(pcx, pcy, palmR, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  requestAnimationFrame(draw);
}

// --- Init ---
async function init() {
  const hands = new window.Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${file}`
  });
  hands.setOptions({
    maxNumHands: 2, modelComplexity: 1,
    minDetectionConfidence: 0.6, minTrackingConfidence: 0.5
  });
  hands.onResults(onResults);

  const stream = await navigator.mediaDevices.getUserMedia({
    video: { width: 1280, height: 720, facingMode: 'user' }
  });
  video.srcObject = stream;
  await video.play();

  const cam = new window.Camera(video, {
    onFrame: async () => { await hands.send({ image: video }); },
    width: 1280, height: 720
  });
  cam.start();

  document.getElementById('start-screen').classList.add('hidden');
  draw();
}

document.getElementById('start-btn').addEventListener('click', () => {
  const btn = document.getElementById('start-btn');
  btn.textContent = 'Loading...';
  btn.style.opacity = '0.6';
  init().catch(err => {
    btn.textContent = 'Error - Tap to Retry';
    btn.style.opacity = '1';
    console.error('Init error:', err);
  });
});

if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
</script>
</body>
</html>
